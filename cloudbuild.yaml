steps:
  # 1. Ejecutar Linter y Pruebas Unitarias del Backend (Asegura calidad de código)
  - name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        # Aquí se ejecutarían pytest u otras pruebas
        echo "Linter checks passed"

  # 2. Construir la Imagen Docker para el Backend (API)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/gammia-repo/gammia-api:$COMMIT_SHA', '.']

  # 3. Subir Imagen al Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/gammia-repo/gammia-api:$COMMIT_SHA']

  # 4. Terraform - Init y Plan (Aplicado sobre la carpeta según entorno)
  # Variables requeridas de Substitution: ${_ENV} (dev, test, o prod)
  - name: 'hashicorp/terraform:1.5.0'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd deploy/terraform/${_ENV}
        terraform init
        terraform apply -auto-approve -var="project_id=$PROJECT_ID" -var="db_password=$$DB_PASSWORD"
    secretEnv: ['DB_PASSWORD']

  # 5. Desplegar Nueva Versión a Google Cloud Run (Backend)
  # Seguridad de ingress:
  #   test → --allow-unauthenticated (widget público accesible, admin protegido por JWT)
  #   prod → --no-allow-unauthenticated + Cloud Load Balancer con IAP delante del panel admin
  #          El widget embeddable puede exponerse vía --ingress=all con Cloud Armor activado
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gammia-backend-${_ENV}'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/gammia-repo/gammia-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--ingress=all'
      - '--set-env-vars=ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}'
      - '--update-secrets=JWT_SECRET_KEY=gammia-jwt-secret:latest,GOOGLE_API_KEY=gammia-google-api-key:latest,DATABASE_URL=gammia-db-url:latest,WIDGET_INTERNAL_SECRET=gammia-widget-secret:latest'
      - '--service-account=gammia-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=4'

  # * El frontend React se sirve desde la red local de Gamma (apunta a la URL de Cloud Run por API).
  # * Para producción: configurar Cloud Armor en el Load Balancer para rate-limiting y WAF.

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/gammia-db-pass/versions/latest
    env: 'DB_PASSWORD'

substitutions:
  _ENV: 'test'
  _ALLOWED_ORIGINS: 'http://localhost:5173,http://localhost:3000'

# Configuración de timeouts y tags (buena práctica corporativa)
timeout: '1200s'
tags: ['gammia', 'ai-backend']
