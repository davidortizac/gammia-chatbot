server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html nunca debe cachearse — el browser siempre busca la versión más nueva
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Proxy API calls → backend (URL inyectada en runtime via BACKEND_URL)
    location /api/ {
        proxy_pass        ${BACKEND_URL};
        proxy_set_header  Host              $http_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # Timeouts generosos para uploads RAG y búsquedas vectoriales
        proxy_connect_timeout  30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Soporte para respuestas grandes (uploads de documentos)
        client_max_body_size  50m;
        proxy_buffering       off;
    }

    # Proxy static widget assets → backend
    location /static/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $http_host;
    }

    # SPA fallback: cualquier ruta no-archivo → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets del bundle Vite (tienen hash en nombre) — caché agresiva
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
